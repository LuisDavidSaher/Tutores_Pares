spring.application.name=backend

# Configuración de H2 en modo Archivo Permanente (File Mode)
# Esto guardará todos los datos en un archivo llamado "sgtp_db" en la misma carpeta de su proyecto Java.
spring.datasource.url=jdbc:h2:file:./sgtp_db;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate (JPA) actualiza las columnas automáticamente sin borrar los datos existentes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Habilitar la consola de H2 para que usted pueda ver las tablas si lo desea
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console